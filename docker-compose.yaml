services:
  fuseki:
    image: stain/jena-fuseki:latest
    container_name: nltosparql-fuseki
    restart: unless-stopped
    ports:
      - "3030:3030"
    volumes:
      # Persistenza dei dataset
      - fuseki-data:/fuseki-base/databases
      # Persistenza della configurazione
      - fuseki-config:/fuseki-base/configuration
    environment:
      # Local database password
      - ADMIN_PASSWORD=${FUSEKI_ADMIN_PASSWORD}
      # Memoria JVM massima (adatta in base alle risorse disponibili)
      - JAVA_OPTIONS=-Xmx2g
    healthcheck:
      # Verifica che Fuseki sia pronto a ricevere richieste
      test: ["CMD", "curl", "-f", "http://localhost:3030/$/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - nltosparql-network
    labels:
      - "project=nltosparql"
      - "component=knowledge-graph"

volumes:
  fuseki-data:
    driver: local
    labels:
      - "project=nltosparql"
      - "purpose=knowledge-graph-storage"
  fuseki-config:
    driver: local
    labels:
      - "project=nltosparql"
      - "purpose=configuration-storage"

networks:
  nltosparql-network:
    driver: bridge
    labels:
      - "project=nltosparql"